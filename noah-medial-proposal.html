document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 src: url(\"2632fa17-e177-422f-a186-05c9a5517892\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- BRAND COLORS — Core ---------- */\n  --sl-teal-deep:   #052C25;   /* Primary dark — covers, hero sections */\n  --sl-mint:        #00F8BA;   /* PRIMARY accent — bright signal mint */\n  --sl-near-black:  #111112;   /* Header/footer bars, body text on light */\n  --sl-white:       #FFFFFF;\n\n  /* ---------- BRAND COLORS — Supporting Teals ---------- */\n  --sl-teal-mid:    #213C3D;   /* Secondary section headers */\n  --sl-teal-navy:   #0C2530;   /* Appendix / data-heavy sections */\n  --sl-teal-2:      #2AAE91;   /* Secondary mint — chart series 3 */\n  --sl-border:      #00C49A;   /* Dividers / borders, mid-teal */\n  --sl-light-bg:    #E8FBF6;   /* Light teal — callout bg */\n  --sl-row-alt:     #F0FBF7;   /* Alternating table row */\n\n  /* ---------- BRAND COLORS — Neutrals ---------- */\n  --sl-offwhite:    #F4F1EE;   /* Warm off-white — alt bg */\n  --sl-light-gray:  #EDEEEE;   /* Hairline dividers */\n  --sl-gray:        #888888;   /* Muted text / footer */\n  --sl-body:        #333333;   /* Body text on light, slightly softer */\n\n  /* ---------- BRAND COLORS — Semantic ---------- */\n  --sl-amber:       #E8A020;   /* Warning / opportunity */\n  --sl-green:       #38A169;   /* Positive / strong performance */\n  --sl-red:         #E53E3E;   /* Negative / gap */\n\n  /* ---------- FOREGROUND ROLES (light mode) ---------- */\n  --fg-1: var(--sl-near-black);   /* Primary body text on light bg */\n  --fg-2: var(--sl-body);         /* Secondary body text */\n  --fg-3: var(--sl-gray);         /* Tertiary / captions */\n  --fg-accent: var(--sl-teal-deep);\n\n  /* ---------- BACKGROUND ROLES ---------- */\n  --bg-1: var(--sl-white);        /* Primary page bg */\n  --bg-2: var(--sl-offwhite);     /* Alt section bg */\n  --bg-3: var(--sl-light-bg);     /* Callouts */\n  --bg-dark: var(--sl-teal-deep); /* Dark hero / cover */\n  --bg-darker: var(--sl-near-black);\n\n  /* ---------- ON-DARK FOREGROUND ROLES ---------- */\n  --fg-on-dark-1: var(--sl-white);\n  --fg-on-dark-2: rgba(255,255,255,0.75);\n  --fg-on-dark-3: rgba(255,255,255,0.5);\n  --fg-on-dark-accent: var(--sl-mint);\n\n  /* ---------- TYPOGRAPHY ---------- */\n  --font-sans:    'Lato', Helvetica, Arial, Calibri, sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n  --font-display: 'Lato', Helvetica, Arial, sans-serif;\n\n  /* Status Labs uses Lato system-wide; weights are the rhythm */\n  --fw-light:    300;\n  --fw-regular:  400;\n  --fw-bold:     700;\n  --fw-black:    900;\n\n  /* Scale — type tokens (rem-based, 16px base) */\n  --t-display: clamp(40px, 5.5vw, 72px);   /* Cover slabs, hero */\n  --t-h1:      36px;\n  --t-h2:      28px;\n  --t-h3:      20px;\n  --t-h4:      16px;\n  --t-body:    15px;\n  --t-small:   13px;\n  --t-micro:   11px;       /* Eyebrow labels, footers */\n\n  /* Line heights */\n  --lh-tight:  1.15;\n  --lh-snug:   1.25;\n  --lh-normal: 1.5;\n  --lh-loose:  1.7;\n\n  /* Tracking (letter-spacing) — eyebrow labels are spaced WIDE */\n  --tr-tight:   -0.01em;\n  --tr-normal:  0;\n  --tr-wide:    0.08em;\n  --tr-wider:   0.18em;     /* \"STATUS LABS\" / \"REPORT\" eyebrow look */\n  --tr-widest:  0.28em;\n\n  /* ---------- SPACING (4-pt grid) ---------- */\n  --sp-0:  0;\n  --sp-1:  4px;\n  --sp-2:  8px;\n  --sp-3:  12px;\n  --sp-4:  16px;\n  --sp-5:  24px;\n  --sp-6:  32px;\n  --sp-7:  48px;\n  --sp-8:  64px;\n  --sp-9:  96px;\n  --sp-10: 128px;\n\n  /* ---------- RADII ---------- */\n  --r-none: 0;\n  --r-xs:   2px;\n  --r-sm:   4px;\n  --r-md:   6px;       /* Default — buttons, cards */\n  --r-lg:   10px;\n  --r-pill: 999px;\n\n  /* ---------- ELEVATION ---------- */\n  --shadow-1: 0 1px 2px rgba(5, 44, 37, 0.06), 0 1px 1px rgba(5, 44, 37, 0.04);\n  --shadow-2: 0 4px 12px rgba(5, 44, 37, 0.08), 0 1px 2px rgba(5, 44, 37, 0.04);\n  --shadow-3: 0 10px 30px rgba(5, 44, 37, 0.12), 0 2px 4px rgba(5, 44, 37, 0.06);\n  --shadow-mint-glow: 0 0 0 4px rgba(0, 248, 186, 0.18);\n\n  /* ---------- BORDERS ---------- */\n  --border-hair: 1px solid var(--sl-light-gray);\n  --border-soft: 1px solid rgba(5,44,37,0.10);\n  --border-strong: 2px solid var(--sl-teal-deep);\n  --border-mint: 3px solid var(--sl-mint);   /* Signature mint accent rule */\n\n  /* ---------- MOTION ---------- */\n  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);\n  --dur-fast: 120ms;\n  --dur-base: 200ms;\n  --dur-slow: 360ms;\n\n  /* ---------- LAYOUT ---------- */\n  --content-max: 1200px;\n  --content-narrow: 800px;\n}\n\n/* =========================================================================\n   Semantic element styles\n   ========================================================================= */\n\nhtml, body {\n  font-family: var(--font-sans);\n  font-size: var(--t-body);\n  line-height: var(--lh-normal);\n  color: var(--fg-1);\n  background: var(--bg-1);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\nh1, .h1 {\n  font-family: var(--font-display);\n  font-size: var(--t-h1);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tr-tight);\n  color: var(--fg-accent);\n  margin: 0 0 var(--sp-4);\n}\n\nh2, .h2 {\n  font-family: var(--font-display);\n  font-size: var(--t-h2);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--tr-tight);\n  color: var(--fg-accent);\n  margin: 0 0 var(--sp-3);\n}\n\nh3, .h3 {\n  font-family: var(--font-display);\n  font-size: var(--t-h3);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-snug);\n  color: var(--fg-1);\n  margin: 0 0 var(--sp-2);\n}\n\nh4, .h4 {\n  font-family: var(--font-sans);\n  font-size: var(--t-h4);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-snug);\n  color: var(--fg-1);\n  margin: 0 0 var(--sp-2);\n}\n\np {\n  font-family: var(--font-sans);\n  font-size: var(--t-body);\n  line-height: var(--lh-normal);\n  color: var(--fg-1);\n  text-wrap: pretty;\n  margin: 0 0 var(--sp-3);\n}\n\nsmall, .small {\n  font-size: var(--t-small);\n  color: var(--fg-2);\n}\n\n.eyebrow,\n.label {\n  font-family: var(--font-sans);\n  font-size: var(--t-micro);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--tr-wider);\n  text-transform: uppercase;\n  color: var(--sl-mint);\n}\n\n.display {\n  font-family: var(--font-display);\n  font-size: var(--t-display);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tr-tight);\n}\n\ncode, kbd, pre, samp {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n}\n\ncode {\n  background: var(--sl-light-bg);\n  color: var(--sl-teal-deep);\n  padding: 1px 6px;\n  border-radius: var(--r-xs);\n}\n\na {\n  color: var(--sl-teal-deep);\n  text-decoration: underline;\n  text-decoration-color: var(--sl-mint);\n  text-decoration-thickness: 2px;\n  text-underline-offset: 3px;\n  transition: color var(--dur-fast) var(--ease-out);\n}\na:hover { color: var(--sl-teal-2); }\n\nhr {\n  border: 0;\n  border-top: var(--border-hair);\n  margin: var(--sp-5) 0;\n}\n\n::selection {\n  background: var(--sl-mint);\n  color: var(--sl-near-black);\n}\n\n/* =========================================================================\n   Reusable utility classes (mirrors document-layouts.md)\n   ========================================================================= */\n\n.bg-brand   { background: var(--sl-teal-deep); color: var(--sl-white); }\n.bg-mint    { background: var(--sl-mint); color: var(--sl-near-black); }\n.bg-light   { background: var(--sl-light-bg); }\n.bg-dark    { background: var(--sl-near-black); color: var(--sl-white); }\n\n.text-mint  { color: var(--sl-mint); }\n.text-teal  { color: var(--sl-teal-deep); }\n.text-muted { color: var(--sl-gray); }\n\n.rule-mint { height: 3px; background: var(--sl-mint); border: 0; }\n.rule-hair { height: 1px; background: var(--sl-light-gray); border: 0; }\n<\u002Fstyle>\n<script src=\"790311a2-cc0a-4f58-8d3f-d4baa5a6c699\"><\u002Fscript>\n<style>\n  :root {\n    /* Projection-appropriate type scale at 1920x1080 */\n    --t-title: 64px;\n    --t-subtitle: 44px;\n    --t-body: 34px;\n    --t-small: 28px;\n    --t-eyebrow: 20px;\n    --sp-px: 120px;   /* slide horizontal padding */\n    --sp-py: 110px;   /* slide vertical padding */\n    --sp-title-gap: 56px;\n    --sp-item-gap: 32px;\n  }\n\n  html, body { margin: 0; background: #0a0a0a; font-family: var(--font-sans); color: var(--fg-1); }\n\n  deck-stage { background: #0a0a0a; }\n\n  /* Every slide */\n  section.slide {\n    color: var(--fg-1);\n    font-family: var(--font-sans);\n    overflow: hidden;\n  }\n  section.slide.problem,\n  section.slide.approach,\n  section.slide.timeline,\n  section.slide.pricing { background: var(--sl-white); }\n  section.slide.case,\n  section.slide.testimonials { background: var(--sl-offwhite); }\n  section.slide.cover,\n  section.slide.hardproblem,\n  section.slide.why,\n  section.slide.nextsteps { /* dark bg defined in their own rules */ }\n\n  /* ---------- Shared slide chrome ---------- */\n  .chrome-hdr {\n    position: absolute; top: 0; left: 0; right: 0; height: 64px;\n    background: var(--sl-near-black);\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 0 56px; z-index: 5;\n  }\n  .chrome-hdr .brand {\n    font-size: 16px; font-weight: 900; letter-spacing: 0.28em; color: var(--sl-mint);\n  }\n  .chrome-hdr .doc {\n    font-size: 16px; color: #fff; letter-spacing: 0.08em;\n  }\n  .chrome-stripe {\n    position: absolute; top: 64px; left: 0; right: 0; height: 4px;\n    background: var(--sl-mint); z-index: 5;\n  }\n  .chrome-ftr {\n    position: absolute; bottom: 0; left: 0; right: 0; height: 48px;\n    background: var(--sl-near-black);\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 0 56px;\n    font-size: 14px; color: rgba(255,255,255,0.6); letter-spacing: 0.08em;\n    z-index: 5;\n  }\n  .chrome-ftr .num { color: var(--sl-mint); font-weight: 700; letter-spacing: 0.18em; }\n\n  .slide-body {\n    position: absolute; top: 68px; left: 0; right: 0; bottom: 48px;\n    padding: 96px var(--sp-px) 80px;\n    display: flex; flex-direction: column;\n  }\n\n  /* Eyebrow + title block */\n  .eb {\n    font-size: var(--t-eyebrow); font-weight: 700;\n    letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--sl-teal-2);\n    margin: 0 0 24px;\n  }\n  .eb.on-dark { color: var(--sl-mint); }\n  h2.title {\n    font-size: var(--t-title); font-weight: 700;\n    color: var(--sl-teal-deep);\n    letter-spacing: -0.01em; line-height: 1.08;\n    margin: 0 0 var(--sp-title-gap);\n    max-width: 1500px;\n  }\n  h2.title.on-dark { color: #fff; }\n\n  .title-rule {\n    width: 80px; height: 4px; background: var(--sl-mint);\n    margin: 0 0 36px;\n  }\n\n  /* ============================================\n     01 — COVER\n     ============================================ */\n  section.slide.cover {\n    background: var(--sl-teal-deep);\n    color: #fff;\n    position: relative;\n  }\n  .cover .accent-lines { position: absolute; inset: 0; opacity: 0.08; pointer-events: none; }\n  .cover .accent-lines::before,\n  .cover .accent-lines::after {\n    content: \"\"; position: absolute; height: 1px; background: var(--sl-mint);\n    width: 140%; left: -20%; transform-origin: left center;\n  }\n  .cover .accent-lines::before { top: 22%; transform: rotate(-10deg); }\n  .cover .accent-lines::after  { top: 78%; transform: rotate(-10deg); }\n\n  .cover-hdr {\n    position: absolute; top: 0; left: 0; right: 0; height: 80px;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 0 96px; z-index: 5;\n  }\n  .cover-hdr .emblem-sm { height: 36px; width: auto; }\n  .cover-hdr .eb-small {\n    font-size: 24px; font-weight: 700; letter-spacing: 0.32em;\n    color: var(--sl-mint); text-transform: uppercase;\n  }\n\n  .cover-inner {\n    position: absolute; inset: 0;\n    display: flex; flex-direction: column; justify-content: center;\n    padding: 0 140px;\n  }\n  .cover-eyebrow {\n    font-size: 26px; font-weight: 700; letter-spacing: 0.32em;\n    color: var(--sl-mint); text-transform: uppercase;\n    margin-bottom: 40px;\n  }\n  .cover h1 {\n    font-size: 118px; font-weight: 900; color: #fff;\n    letter-spacing: -0.02em; line-height: 0.98;\n    margin: 0 0 32px;\n    max-width: 1500px;\n  }\n  .cover .mint-rule {\n    width: 180px; height: 5px; background: var(--sl-mint);\n    margin: 40px 0;\n  }\n  .cover .cover-sub {\n    font-size: 42px; font-weight: 300; color: rgba(255,255,255,0.88);\n    max-width: 1300px; line-height: 1.25; margin: 0 0 72px;\n    font-style: italic;\n  }\n  .cover-meta {\n    display: grid; grid-template-columns: repeat(3, auto);\n    gap: 80px; align-items: start;\n  }\n  .cover-meta .mlbl {\n    font-size: 24px; font-weight: 700; letter-spacing: 0.24em;\n    color: var(--sl-mint); text-transform: uppercase;\n    margin-bottom: 14px;\n  }\n  .cover-meta .mval {\n    font-size: 26px; font-weight: 400; color: #fff; letter-spacing: 0.02em; line-height: 1.35;\n  }\n  .cover-ftr {\n    position: absolute; bottom: 48px; left: 140px; right: 140px;\n    display: flex; align-items: center; justify-content: space-between;\n    font-size: 24px; color: rgba(255,255,255,0.55); letter-spacing: 0.24em;\n    text-transform: uppercase;\n  }\n\n  /* ============================================\n     02 — PROBLEM (SERP-style visualization)\n     ============================================ */\n  .problem .slide-body { padding: 100px 120px 80px; }\n  .problem-top {\n    display: flex; align-items: flex-end; justify-content: space-between;\n    gap: 80px; margin-bottom: 56px;\n  }\n  .problem-top .title-col { flex: 1; max-width: 1000px; }\n  .problem-top h2.title {\n    margin: 0; font-size: 72px; line-height: 1.05;\n  }\n  .problem-pull {\n    font-size: 26px; font-weight: 700; color: var(--sl-red);\n    text-align: right; line-height: 1.3;\n    letter-spacing: 0.04em; max-width: 360px;\n  }\n  .serp {\n    flex: 1;\n    background: #fff;\n    border: 1px solid var(--sl-light-gray);\n    border-radius: 8px;\n    padding: 28px 40px 20px;\n    box-shadow: var(--shadow-2);\n    display: flex; flex-direction: column;\n    min-height: 420px;\n  }\n  .serp-head {\n    display: flex; align-items: center; gap: 16px;\n    padding-bottom: 16px; border-bottom: 1px solid var(--sl-light-gray);\n    margin-bottom: 22px;\n  }\n  .serp-search {\n    flex: 1;\n    border: 1px solid var(--sl-light-gray); border-radius: 999px;\n    padding: 12px 24px; font-size: 22px; color: var(--sl-near-black);\n    display: flex; align-items: center; justify-content: space-between;\n  }\n  .serp-search .q { font-weight: 700; }\n  .serp-search .tab { font-size: 14px; color: var(--sl-gray); letter-spacing: 0.14em; }\n  .serp-results { display: flex; flex-direction: column; gap: 20px; }\n  .serp-r { padding: 10px 16px; border-radius: 6px; }\n  .serp-r .url { font-size: 16px; color: var(--sl-gray); margin-bottom: 4px; }\n  .serp-r .rtitle { font-size: 22px; color: var(--sl-teal-deep); font-weight: 700; margin-bottom: 4px; }\n  .serp-r .snip { font-size: 15px; color: var(--sl-body); line-height: 1.5; }\n  .serp-r.flag {\n    background: rgba(229, 62, 62, 0.08);\n    border-left: 4px solid var(--sl-red);\n    position: relative;\n  }\n  .serp-r.flag::after {\n    content: \"RANKING NOW\"; position: absolute; top: 14px; right: 14px;\n    font-size: 11px; font-weight: 900; letter-spacing: 0.22em;\n    color: var(--sl-red);\n  }\n  .serp-r.flag .rtitle { color: var(--sl-red); }\n  .serp-r.flag .url { color: #8a2020; }\n\n  .problem-impact {\n    display: grid; grid-template-columns: repeat(3, 1fr);\n    gap: 2px; background: var(--sl-light-gray);\n    border-radius: 8px; overflow: hidden;\n    margin-top: auto;\n  }\n  .problem-impact .cell {\n    background: var(--sl-offwhite); padding: 36px 32px;\n  }\n  .problem-impact .ilbl {\n    font-size: 14px; font-weight: 700; letter-spacing: 0.22em;\n    color: var(--sl-teal-2); text-transform: uppercase;\n    margin-bottom: 12px;\n  }\n  .problem-impact .ival {\n    font-size: 30px; font-weight: 700; color: var(--sl-teal-deep);\n    line-height: 1.25; letter-spacing: -0.005em;\n  }\n\n  /* ============================================\n     03 — WHY IT WON'T FIX ITSELF (big stat)\n     ============================================ */\n  section.slide.hardproblem {\n    background: var(--sl-near-black); color: #fff;\n  }\n  .hardproblem .slide-body { padding: 120px 120px 80px; }\n  .hardproblem h2.title { color: #fff; max-width: 1200px; }\n  .hp-grid {\n    display: grid; grid-template-columns: 1fr 1px 1fr;\n    gap: 80px; margin-top: 24px;\n    align-items: start;\n  }\n  .hp-divider { background: rgba(255,255,255,0.12); height: 100%; min-height: 380px; }\n  .hp-stat {\n    font-size: 180px; font-weight: 900; color: var(--sl-mint);\n    line-height: 0.9; letter-spacing: -0.04em;\n    margin-bottom: 24px;\n  }\n  .hp-stat .unit { font-size: 72px; color: var(--sl-mint); }\n  .hp-statlbl {\n    font-size: 28px; font-weight: 400; color: #fff;\n    line-height: 1.35; max-width: 560px;\n  }\n  .hp-statlbl b { font-weight: 700; color: var(--sl-mint); }\n  .hp-reasons { display: flex; flex-direction: column; gap: 28px; padding-top: 4px; }\n  .hp-reason { display: flex; gap: 24px; align-items: flex-start; }\n  .hp-reason .hpnum {\n    font-size: 24px; font-weight: 900; color: var(--sl-mint);\n    letter-spacing: 0.1em; flex-shrink: 0; padding-top: 4px; min-width: 52px;\n  }\n  .hp-reason .hptxt {\n    font-size: 26px; color: rgba(255,255,255,0.9); line-height: 1.4;\n  }\n  .hp-reason .hptxt b { color: #fff; font-weight: 700; }\n\n  /* ============================================\n     04 — THREE-PART APPROACH (3 columns)\n     ============================================ */\n  .approach .slide-body { padding: 96px 96px 76px; }\n  .approach-grid {\n    display: grid; grid-template-columns: repeat(3, 1fr);\n    gap: 32px; margin-top: 16px; flex: 1;\n  }\n  .approach-card {\n    background: var(--sl-offwhite);\n    border-top: 4px solid var(--sl-mint);\n    padding: 44px 40px;\n    display: flex; flex-direction: column;\n    border-radius: 4px;\n  }\n  .approach-card .pn {\n    font-size: 22px; font-weight: 900; color: var(--sl-teal-2);\n    letter-spacing: 0.24em; margin-bottom: 20px;\n  }\n  .approach-card h3 {\n    font-size: 40px; font-weight: 700; color: var(--sl-teal-deep);\n    line-height: 1.1; margin: 0 0 28px;\n    letter-spacing: -0.005em;\n  }\n  .approach-card .lead {\n    font-size: 22px; font-weight: 400; color: var(--sl-body);\n    line-height: 1.45; margin: 0 0 24px;\n  }\n  .approach-card .lead b { color: var(--sl-teal-deep); font-weight: 700; }\n  .approach-card .pts {\n    list-style: none; padding: 0; margin: auto 0 0;\n    border-top: 1px solid rgba(5,44,37,0.15); padding-top: 24px;\n  }\n  .approach-card .pts li {\n    font-size: 20px; color: var(--sl-teal-deep); line-height: 1.35;\n    padding: 10px 0; display: flex; align-items: flex-start; gap: 14px;\n  }\n  .approach-card .pts li::before {\n    content: \"\"; width: 10px; height: 10px; background: var(--sl-mint);\n    border-radius: 50%; margin-top: 11px; flex-shrink: 0;\n  }\n\n  /* ============================================\n     05 — TIMELINE (horizontal)\n     ============================================ */\n  .timeline .slide-body { padding: 96px 96px 80px; }\n  .tl-track {\n    position: relative; margin-top: 56px; flex: 1;\n    display: grid; grid-template-columns: repeat(5, 1fr); gap: 0;\n  }\n  .tl-line {\n    position: absolute; top: 52px; left: 6%; right: 6%;\n    height: 3px; background: linear-gradient(to right, var(--sl-mint), var(--sl-teal-2));\n  }\n  .tl-phase {\n    display: flex; flex-direction: column; align-items: center;\n    padding: 0 18px; position: relative;\n  }\n  .tl-phase .dot {\n    width: 24px; height: 24px; border-radius: 50%;\n    background: var(--sl-mint);\n    border: 5px solid var(--sl-teal-deep);\n    box-shadow: 0 0 0 4px rgba(0,248,186,0.2);\n    margin-top: 40px; margin-bottom: 28px;\n    z-index: 2;\n  }\n  .tl-phase .ph {\n    font-size: 20px; font-weight: 900; color: var(--sl-teal-2);\n    letter-spacing: 0.22em; text-transform: uppercase;\n    margin-bottom: 12px; text-align: center;\n  }\n  .tl-phase .pm {\n    font-size: 32px; font-weight: 700; color: var(--sl-teal-deep);\n    margin-bottom: 20px; letter-spacing: -0.005em; text-align: center;\n    line-height: 1.1;\n  }\n  .tl-phase .pd {\n    font-size: 19px; color: var(--sl-body); line-height: 1.45;\n    text-align: center;\n    max-width: 280px;\n  }\n  .tl-phase.now .dot { background: var(--sl-mint); box-shadow: 0 0 0 8px rgba(0,248,186,0.28); }\n  .tl-footnote {\n    margin-top: 40px; padding: 20px 28px;\n    background: var(--sl-light-bg); border-left: 4px solid var(--sl-mint);\n    font-size: 22px; color: var(--sl-teal-deep); line-height: 1.45;\n    font-style: italic;\n  }\n  .tl-footnote b { font-style: normal; }\n\n  /* ============================================\n     06 — INVESTMENT (pricing table)\n     ============================================ */\n  .pricing .slide-body { padding: 96px 120px 80px; }\n  .pricing-grid {\n    display: grid; grid-template-columns: 1fr 1fr 1.1fr;\n    gap: 24px; margin-top: 24px;\n    align-items: stretch;\n  }\n  .price-card {\n    background: var(--sl-offwhite);\n    border: 1px solid var(--sl-light-gray);\n    border-radius: 6px;\n    padding: 48px 44px 44px;\n    display: flex; flex-direction: column;\n    position: relative;\n  }\n  .price-card .plbl {\n    font-size: 18px; font-weight: 700; letter-spacing: 0.2em;\n    text-transform: uppercase; color: var(--sl-teal-2);\n    margin-bottom: 16px;\n  }\n  .price-card h3 {\n    font-size: 34px; font-weight: 700; color: var(--sl-teal-deep);\n    line-height: 1.15; margin: 0 0 32px;\n    letter-spacing: -0.005em;\n  }\n  .price-card .amount {\n    display: flex; align-items: baseline; gap: 8px;\n    margin-bottom: 12px;\n  }\n  .price-card .amount .dollars {\n    font-size: 72px; font-weight: 900; color: var(--sl-teal-deep);\n    line-height: 1; letter-spacing: -0.02em;\n  }\n  .price-card .amount .per {\n    font-size: 22px; color: var(--sl-gray); font-weight: 400;\n  }\n  .price-card .kw {\n    font-size: 18px; color: var(--sl-gray); margin-bottom: 28px;\n    letter-spacing: 0.05em;\n  }\n  .price-card .fline {\n    border-top: 1px solid rgba(5,44,37,0.12);\n    padding-top: 24px;\n    font-size: 18px; color: var(--sl-body); line-height: 1.45;\n    margin-top: auto;\n  }\n  .price-card.feature {\n    background: var(--sl-teal-deep); color: #fff;\n    border: 1px solid var(--sl-teal-deep);\n    box-shadow: 0 12px 40px rgba(5,44,37,0.2);\n  }\n  .price-card.feature .plbl { color: var(--sl-mint); }\n  .price-card.feature h3 { color: #fff; }\n  .price-card.feature .amount .dollars { color: var(--sl-mint); }\n  .price-card.feature .amount .per { color: rgba(255,255,255,0.6); }\n  .price-card.feature .kw { color: rgba(255,255,255,0.7); }\n  .price-card.feature .fline { color: rgba(255,255,255,0.85); border-top-color: rgba(0,248,186,0.3); }\n  .price-card.feature::before {\n    content: \"RECOMMENDED\"; position: absolute;\n    top: -14px; right: 32px;\n    background: var(--sl-mint); color: var(--sl-near-black);\n    font-size: 14px; font-weight: 900; letter-spacing: 0.24em;\n    padding: 8px 16px; border-radius: 4px;\n  }\n  .pricing-terms {\n    margin-top: 40px; display: flex; gap: 64px;\n    font-size: 18px; color: var(--sl-body); line-height: 1.4;\n  }\n  .pricing-terms .tkey {\n    font-size: 14px; font-weight: 700; letter-spacing: 0.2em;\n    color: var(--sl-teal-2); text-transform: uppercase;\n    margin-bottom: 6px;\n  }\n\n  /* ============================================\n     07 / 08 — CASE STUDIES\n     ============================================ */\n  section.slide.case { background: var(--sl-offwhite); }\n  .case .slide-body { padding: 96px 120px 80px; }\n  .case-eyebrow-row {\n    display: flex; align-items: baseline; gap: 32px;\n    margin-bottom: 32px;\n  }\n  .case-eyebrow-row .cnum {\n    font-size: 28px; font-weight: 900; color: var(--sl-mint);\n    letter-spacing: 0.28em;\n  }\n  .case-eyebrow-row .ctag {\n    font-size: 18px; font-weight: 700; letter-spacing: 0.22em;\n    text-transform: uppercase; color: var(--sl-teal-2);\n  }\n  .case h2.title {\n    font-size: 60px; margin-bottom: 40px; max-width: 1500px;\n  }\n  .case-layout {\n    display: grid; grid-template-columns: 1fr 1fr;\n    gap: 72px; flex: 1;\n  }\n  .case-narrative {\n    display: flex; flex-direction: column; gap: 28px;\n  }\n  .suppressed-chips {\n    display: flex; flex-wrap: wrap; gap: 10px;\n    margin-top: 4px;\n  }\n  .suppressed-chips .chip {\n    display: inline-block;\n    background: #fff;\n    border: 1px solid var(--sl-red);\n    color: var(--sl-red);\n    font-size: 17px; font-weight: 700;\n    letter-spacing: 0.02em;\n    padding: 8px 14px;\n    border-radius: 4px;\n    position: relative;\n    text-decoration: line-through;\n    text-decoration-color: rgba(229,62,62,0.7);\n    text-decoration-thickness: 2px;\n  }\n  .case-nitem { }\n  .case-nitem .nkey {\n    font-size: 16px; font-weight: 900; letter-spacing: 0.24em;\n    text-transform: uppercase; color: var(--sl-teal-2);\n    margin-bottom: 10px;\n  }\n  .case-nitem .nbody {\n    font-size: 20px; color: var(--sl-near-black); line-height: 1.5;\n  }\n  .case-nitem .nbody b { color: var(--sl-teal-deep); font-weight: 700; }\n\n  .case-results {\n    background: var(--sl-teal-deep); color: #fff;\n    border-radius: 6px; padding: 56px 48px;\n    display: flex; flex-direction: column; gap: 40px;\n    justify-content: center;\n  }\n  .case-stat { }\n  .case-stat .ckey {\n    font-size: 14px; font-weight: 700; letter-spacing: 0.28em;\n    text-transform: uppercase; color: var(--sl-mint);\n    margin-bottom: 10px;\n  }\n  .case-stat .cval {\n    font-size: 58px; font-weight: 900; color: #fff;\n    line-height: 1.05; letter-spacing: -0.015em;\n  }\n  .case-stat .cval .unit { font-size: 28px; color: var(--sl-mint); font-weight: 400; letter-spacing: 0.1em; }\n  .case-stat .csub { font-size: 20px; color: rgba(255,255,255,0.75); margin-top: 8px; }\n  .case-results .rhr {\n    height: 1px; background: rgba(0,248,186,0.3);\n  }\n  .case-results .ruling {\n    font-size: 20px; color: rgba(255,255,255,0.82); line-height: 1.45;\n    font-style: italic; border-left: 3px solid var(--sl-mint);\n    padding-left: 20px;\n  }\n\n  /* ============================================\n     09 — WHY STATUS LABS (stats grid)\n     ============================================ */\n  section.slide.why {\n    background: var(--sl-teal-deep); color: #fff;\n  }\n  .why .slide-body { padding: 96px 120px 80px; }\n  .why h2.title { color: #fff; }\n  .why-grid {\n    display: grid; grid-template-columns: repeat(4, 1fr);\n    grid-template-rows: repeat(2, 1fr);\n    gap: 2px;\n    background: rgba(0,248,186,0.18);\n    margin-top: 16px;\n    flex: 1;\n    border-radius: 6px; overflow: hidden;\n  }\n  .why-cell {\n    background: var(--sl-teal-deep);\n    padding: 40px 32px;\n    display: flex; flex-direction: column; justify-content: center;\n    text-align: left;\n  }\n  .why-cell .wn {\n    font-size: 82px; font-weight: 900; color: var(--sl-mint);\n    line-height: 0.95; letter-spacing: -0.025em;\n    margin-bottom: 16px;\n  }\n  .why-cell .wn .plus,\n  .why-cell .wn .unit { font-size: 44px; }\n  .why-cell .wl {\n    font-size: 22px; font-weight: 400; color: #fff; line-height: 1.3;\n  }\n  .why-cell .wl b { font-weight: 700; }\n\n  /* ============================================\n     10 — TESTIMONIALS (two quotes)\n     ============================================ */\n  section.slide.testimonials { background: var(--sl-offwhite); }\n  .testimonials .slide-body { padding: 96px 120px 80px; }\n  .quote-grid {\n    display: grid; grid-template-columns: 1fr 1fr;\n    gap: 56px; flex: 1; margin-top: 24px;\n  }\n  .qcard {\n    background: #fff; border-radius: 6px;\n    padding: 56px 56px 48px;\n    position: relative;\n    box-shadow: var(--shadow-2);\n    display: flex; flex-direction: column;\n    border-top: 4px solid var(--sl-mint);\n  }\n  .qcard .qmark {\n    font-family: Georgia, serif;\n    font-size: 140px; font-weight: 700;\n    color: var(--sl-mint);\n    line-height: 0.5; margin: 14px 0 20px;\n  }\n  .qcard blockquote {\n    margin: 0 0 32px;\n    font-size: 28px; line-height: 1.42; font-weight: 400;\n    color: var(--sl-teal-deep);\n    letter-spacing: -0.005em;\n  }\n  .qcard .attrib {\n    display: flex; align-items: flex-start; gap: 16px;\n    margin-top: auto;\n    padding-top: 28px;\n    border-top: 1px solid var(--sl-light-gray);\n  }\n  .qcard .attrib .arule {\n    width: 32px; height: 3px; background: var(--sl-mint);\n    margin-top: 12px; flex-shrink: 0;\n  }\n  .qcard .attrib .name {\n    font-size: 22px; font-weight: 700; color: var(--sl-near-black);\n    letter-spacing: 0.02em; line-height: 1.3;\n  }\n  .qcard .attrib .role {\n    font-size: 18px; font-weight: 400; color: var(--sl-gray);\n    margin-top: 4px;\n  }\n\n  /* ============================================\n     11 — NEXT STEPS (CTA + contact)\n     ============================================ */\n  section.slide.nextsteps {\n    background: var(--sl-teal-deep); color: #fff;\n  }\n  .nextsteps .accent-lines { position: absolute; inset: 0; opacity: 0.06; pointer-events: none; }\n  .nextsteps .accent-lines::before,\n  .nextsteps .accent-lines::after {\n    content: \"\"; position: absolute; height: 1px; background: var(--sl-mint);\n    width: 140%; left: -20%; transform-origin: left center;\n  }\n  .nextsteps .accent-lines::before { top: 28%; transform: rotate(-10deg); }\n  .nextsteps .accent-lines::after  { top: 72%; transform: rotate(-10deg); }\n\n  .nextsteps .slide-body { padding: 120px 140px 80px; }\n  .ns-eyebrow {\n    font-size: 20px; font-weight: 700; letter-spacing: 0.32em;\n    text-transform: uppercase; color: var(--sl-mint);\n    margin-bottom: 32px;\n  }\n  .ns-headline {\n    font-size: 80px; font-weight: 900; color: #fff;\n    line-height: 1.02; letter-spacing: -0.02em;\n    margin: 0 0 32px;\n    max-width: 1100px;\n  }\n  .ns-tag {\n    font-size: 36px; font-weight: 300; font-style: italic;\n    color: var(--sl-mint); line-height: 1.3;\n    margin: 0 0 56px;\n    max-width: 1400px;\n  }\n  .ns-mintrule {\n    width: 140px; height: 4px; background: var(--sl-mint);\n    margin-bottom: 56px;\n  }\n  .ns-actions {\n    display: grid; grid-template-columns: 1fr 1fr 1fr;\n    gap: 48px;\n    padding-top: 40px;\n    border-top: 1px solid rgba(255,255,255,0.18);\n  }\n  .ns-step { }\n  .ns-step .sn {\n    font-size: 56px; font-weight: 900; color: var(--sl-mint);\n    line-height: 1; letter-spacing: -0.02em; margin-bottom: 16px;\n  }\n  .ns-step .st {\n    font-size: 22px; font-weight: 700; color: #fff;\n    text-transform: uppercase; letter-spacing: 0.16em;\n    margin-bottom: 12px;\n  }\n  .ns-step .sd {\n    font-size: 20px; color: rgba(255,255,255,0.78);\n    line-height: 1.45;\n  }\n  .ns-contact {\n    position: absolute; right: 140px; top: 200px;\n    text-align: right;\n    background: rgba(0,0,0,0.25);\n    border-left: 3px solid var(--sl-mint);\n    padding: 28px 40px;\n  }\n  .ns-contact .cn {\n    font-size: 22px; font-weight: 700; color: var(--sl-mint);\n    letter-spacing: 0.18em; text-transform: uppercase;\n    margin-bottom: 14px;\n  }\n  .ns-contact .cname {\n    font-size: 32px; font-weight: 700; color: #fff;\n    line-height: 1.2;\n  }\n  .ns-contact .crole {\n    font-size: 20px; color: rgba(255,255,255,0.7); margin-top: 4px;\n  }\n  .ns-contact .cemail {\n    font-size: 20px; color: var(--sl-mint); margin-top: 18px;\n    letter-spacing: 0.04em;\n  }\n\n<\u002Fstyle>\n\n<script type=\"application/json\" id=\"speaker-notes\">[]<\u002Fscript>\n\n<style>\n  /* ============================================\n     ANIMATION LAYER (additive only)\n     ============================================ */\n\n  /* Incoming-slide subtle slide-in: we translate the .slide-body wrapper,\n     NOT the section itself — deck-stage controls the section's opacity/visibility. */\n  section[data-label].sl-fresh .slide-body,\n  section[data-label].sl-fresh .cover-inner,\n  section[data-label].sl-fresh .chrome-hdr,\n  section[data-label].sl-fresh .chrome-ftr {\n    animation: slFreshIn 620ms cubic-bezier(0.16, 1, 0.3, 1) both;\n  }\n  @keyframes slFreshIn {\n    from { transform: translateX(28px); opacity: 0; }\n    to   { transform: translateX(0); opacity: 1; }\n  }\n\n  /* Generic element fade-up primitive — longer, softer expo-out curve */\n  .sl-anim {\n    opacity: 0;\n    transform: translateY(14px);\n    transition: opacity 780ms cubic-bezier(0.16, 1, 0.3, 1),\n                transform 780ms cubic-bezier(0.16, 1, 0.3, 1);\n    will-change: opacity, transform;\n  }\n  .sl-anim.sl-in {\n    opacity: 1 !important;\n    transform: translateY(0) !important;\n  }\n\n  /* Mint-rule draw animation */\n  .sl-rule-draw {\n    transform-origin: left center;\n    transform: scaleX(0);\n    transition: transform 900ms cubic-bezier(0.16, 1, 0.3, 1);\n  }\n  .sl-rule-draw.sl-in { transform: scaleX(1) !important; }\n\n  /* Slide-in from left (used for case study results panel) */\n  .sl-from-left {\n    opacity: 0;\n    transform: translateX(-32px);\n    transition: opacity 820ms cubic-bezier(0.16, 1, 0.3, 1),\n                transform 820ms cubic-bezier(0.16, 1, 0.3, 1);\n  }\n  .sl-from-left.sl-in {\n    opacity: 1 !important;\n    transform: translateX(0) !important;\n  }\n\n  /* ============================================\n     NAVIGATION OVERLAY\n     ============================================ */\n  .sl-navbar {\n    position: fixed; inset: 0; pointer-events: none;\n    z-index: 9999;\n  }\n  .sl-arrow {\n    position: absolute;\n    top: 50%;\n    transform: translateY(-50%);\n    width: 56px; height: 56px;\n    display: flex; align-items: center; justify-content: center;\n    background: rgba(0,0,0,0.35);\n    backdrop-filter: blur(4px);\n    border: 1px solid rgba(255,255,255,0.18);\n    border-radius: 999px;\n    color: rgba(255,255,255,0.85);\n    font-size: 22px;\n    cursor: pointer;\n    pointer-events: auto;\n    opacity: 0;\n    transition: opacity 360ms ease, background 240ms ease, transform 240ms ease;\n    user-select: none;\n  }\n  body:hover .sl-arrow { opacity: 0.7; }\n  .sl-arrow:hover { opacity: 1; background: rgba(0,0,0,0.55); }\n  .sl-arrow:active { transform: translateY(-50%) scale(0.94); }\n  .sl-arrow.prev { left: 28px; }\n  .sl-arrow.next { right: 28px; }\n  .sl-arrow[disabled] { opacity: 0.2 !important; cursor: default; }\n  .sl-arrow svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }\n\n  .sl-counter {\n    position: absolute;\n    right: 24px; bottom: 20px;\n    pointer-events: none;\n    font-family: 'Lato', Helvetica, Arial, sans-serif;\n    font-size: 13px; font-weight: 700; letter-spacing: 0.28em;\n    color: rgba(255,255,255,0.55);\n    background: rgba(0,0,0,0.4);\n    padding: 8px 14px;\n    border-radius: 999px;\n    backdrop-filter: blur(4px);\n  }\n  .sl-counter b { color: #00F8BA; font-weight: 900; }\n<\u002Fstyle>\n\n<\u002Fhead><body><div class=\"sl-navbar\" aria-hidden=\"true\">\n  <button class=\"sl-arrow prev\" data-sl-prev=\"\" aria-label=\"Previous slide\">\n    <svg viewBox=\"0 0 24 24\"><polyline points=\"15 6 9 12 15 18\"><\u002Fpolyline><\u002Fsvg>\n  <\u002Fbutton>\n  <button class=\"sl-arrow next\" data-sl-next=\"\" aria-label=\"Next slide\">\n    <svg viewBox=\"0 0 24 24\"><polyline points=\"9 6 15 12 9 18\"><\u002Fpolyline><\u002Fsvg>\n  <\u002Fbutton>\n  <div class=\"sl-counter\"><b data-sl-cur=\"\">1<\u002Fb> &nbsp;/&nbsp; <span data-sl-total=\"\">11<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n(function() {\n  function ready(fn) {\n    if (document.readyState !== 'loading') fn();\n    else document.addEventListener('DOMContentLoaded', fn);\n  }\n\n  ready(() => {\n    const stage = document.querySelector('deck-stage');\n    if (!stage) { console.warn('[anim] no deck-stage'); return; }\n\n    const slides = Array.from(stage.querySelectorAll(':scope > section[data-label]'));\n    const total = slides.length;\n    console.log('[anim] init', { total });\n\n    // Counter UI\n    const curEl = document.querySelector('[data-sl-cur]');\n    const totEl = document.querySelector('[data-sl-total]');\n    const prevBtn = document.querySelector('[data-sl-prev]');\n    const nextBtn = document.querySelector('[data-sl-next]');\n    if (totEl) totEl.textContent = total;\n\n    function curIndex() {\n      // deck-stage sets data-deck-active on the current slide\n      const idx = slides.findIndex(s => s.hasAttribute('data-deck-active'));\n      return idx >= 0 ? idx : 0;\n    }\n\n    function goTo(i) {\n      if (typeof stage.goTo === 'function') stage.goTo(i);\n    }\n\n    prevBtn?.addEventListener('click', (e) => {\n      e.stopPropagation();\n      const i = curIndex();\n      if (i > 0) goTo(i - 1);\n    });\n    nextBtn?.addEventListener('click', (e) => {\n      e.stopPropagation();\n      const i = curIndex();\n      if (i < total - 1) goTo(i + 1);\n    });\n\n    // Click anywhere on slide area to advance (but ignore interactive elements + nav UI)\n    stage.addEventListener('click', (e) => {\n      if (e.target.closest('.sl-arrow, .sl-counter, a, button, input, textarea, .sl-navbar')) return;\n      const i = curIndex();\n      if (i < total - 1) goTo(i + 1);\n    });\n\n    // ============================================\n    // Tag animation targets per slide\n    // ============================================\n    slides.forEach((slide, i) => {\n      try {\n        const isCover = slide.classList.contains('cover');\n        const isCase = slide.classList.contains('case');\n        const isWhy = slide.classList.contains('why');\n        const isNext = slide.classList.contains('nextsteps');\n\n        if (isCover) {\n          const seq = [\n            slide.querySelector('.emblem-sm'),\n            slide.querySelector('.cover-hdr .eb-small'),\n            slide.querySelector('.cover-eyebrow'),\n            slide.querySelector('.mint-rule'),\n            slide.querySelector('.cover h1'),\n            slide.querySelector('.cover-sub'),\n            slide.querySelector('.cover-meta'),\n            slide.querySelector('.cover-ftr'),\n          ].filter(Boolean);\n          seq.forEach((el, idx) => {\n            if (el.classList.contains('mint-rule')) el.classList.add('sl-rule-draw');\n            else el.classList.add('sl-anim');\n            el.dataset.slStep = String(idx);\n          });\n          return;\n        }\n\n        if (isCase) {\n          const steps = [\n            slide.querySelector('.case-eyebrow-row'),\n            slide.querySelector('h2.title'),\n            slide.querySelector('.case-results'),\n            ...slide.querySelectorAll('.case-narrative .case-nitem'),\n          ].filter(Boolean);\n          steps.forEach((el, idx) => {\n            if (el.classList.contains('case-results')) el.classList.add('sl-from-left');\n            else el.classList.add('sl-anim');\n            el.dataset.slStep = String(idx);\n          });\n          return;\n        }\n\n        if (isWhy) {\n          const eb = slide.querySelector('.eb');\n          const h2 = slide.querySelector('h2.title');\n          const cells = Array.from(slide.querySelectorAll('.why-cell'));\n          [eb, h2].filter(Boolean).forEach((el, idx) => {\n            el.classList.add('sl-anim');\n            el.dataset.slStep = String(idx);\n          });\n          cells.forEach((cell, idx) => {\n            cell.classList.add('sl-anim');\n            cell.dataset.slStep = String(idx + 2);\n            // Cache original wn content per cell for count-up\n            const wn = cell.querySelector('.wn');\n            if (wn && !wn.dataset.slOrig) wn.dataset.slOrig = wn.innerHTML;\n          });\n          return;\n        }\n\n        if (isNext) {\n          const seq = [\n            slide.querySelector('.ns-eyebrow'),\n            slide.querySelector('.ns-headline'),\n            slide.querySelector('.ns-mintrule'),\n            slide.querySelector('.ns-tag'),\n            slide.querySelector('.ns-contact'),\n            ...slide.querySelectorAll('.ns-actions .ns-step'),\n          ].filter(Boolean);\n          seq.forEach((el, idx) => {\n            if (el.classList.contains('ns-mintrule')) el.classList.add('sl-rule-draw');\n            else el.classList.add('sl-anim');\n            el.dataset.slStep = String(idx);\n          });\n          return;\n        }\n\n        // Generic content slide\n        const body = slide.querySelector('.slide-body');\n        if (!body) return;\n        const children = Array.from(body.children);\n        let step = 0;\n        children.forEach((child) => {\n          if (child.matches('.approach-grid, .pricing-grid, .quote-grid, .tl-track, .problem-impact, .hp-grid')) {\n            Array.from(child.children).forEach((gc) => {\n              if (gc.classList.contains('tl-line') || gc.classList.contains('hp-divider')) return;\n              gc.classList.add('sl-anim');\n              gc.dataset.slStep = String(step++);\n            });\n          } else {\n            child.classList.add('sl-anim');\n            child.dataset.slStep = String(step++);\n          }\n        });\n      } catch (err) {\n        console.
